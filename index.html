<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GasoLink - Login</title>
    <link rel="stylesheet" href="./style/style.css" />
</head>
<body>
    <div class="container">
        <header class="top-section">
            <h1 class="logo-text">GasoLink</h1>
            <p class="tagline">Inteligência em combustíveis.</p>
        </header>

        <main class="card">
            <div class="welcome-header">
                <h2 class="welcome-title">Bem-vindo!</h2>
                <p class="welcome-subtitle">Identifique-se para continuar.</p>
            </div>

            <form id="loginForm">
                <div class="input-group">
                    <label for="email">E-MAIL</label>
                    <input
                        type="email"
                        id="email"
                        placeholder="usuario@email.com"
                        required
                    />
                </div>

                <div class="input-group">
                    <label for="password">SENHA</label>
                    <input
                        type="password"
                        id="password"
                        placeholder="........"
                        required
                    />
                   
                </div>

                <button type="submit" id="loginBtn" class="login-button">
                    <span id="btnText">Entrar</span>
                    <div id="loader" class="loader hidden"></div>
                </button>
            </form>

          

        </main>
    </div>

    <script src="./script/script.js"></script>
</body>
</html>
