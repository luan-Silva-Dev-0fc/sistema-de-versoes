<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gasolink | Painel de Versões</title>
    <link rel="stylesheet" href="./style/sistema.css" />
  </head>
  <body>
    <div class="container">
      <header>
        <h1>GASOLINK</h1>
        <p>Gerenciamento de Atualizações (APK)</p>
      </header>

      <section class="form-section">
        <div class="form-header">
            <h2 id="form-title">Publicar Nova Versão</h2>
            <button class="btn-logout" onclick="logout()" title="Sair do Painel">SAIR</button>
        </div>
        
        <input type="hidden" id="version-id" />
        <div class="input-group">
            <input type="text" id="nomeVersao" placeholder="Ex: 11.0.1" />
            <input type="text" id="link" placeholder="Link do Cloudflare R2 (https://...)" />
        </div>
        
        <div class="button-group">
            <button id="btn-save" onclick="salvarVersao()">PUBLICAR AGORA</button>
            <button id="btn-cancel" onclick="limparFormulario()" style="display: none; background: #666">CANCELAR</button>
        </div>
      </section>

      <section class="list-section">
        <h2>Versões Ativas</h2>
        <div id="lista-versoes" class="grid-versoes">
          <p class="loading">Carregando versões...</p>
        </div>
      </section>
    </div>
    <script src="./script/sistema.js"></script>
  </body>
</html>
